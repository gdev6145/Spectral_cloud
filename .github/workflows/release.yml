name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for t in $targets; do
            GOOS=${t%/*}
            GOARCH=${t#*/}
            ext=""
            if [ "$GOOS" = "windows" ]; then
              ext=".exe"
            fi
            GOOS=$GOOS GOARCH=$GOARCH go build -o "dist/spectral-cloud-${GOOS}-${GOARCH}${ext}" ./cmd/spectral-cloud
            GOOS=$GOOS GOARCH=$GOARCH go build -o "dist/spectralctl-${GOOS}-${GOARCH}${ext}" ./cmd/spectralctl
          done
          (cd dist && sha256sum * > checksums.txt)
      - name: Generate SBOM
        uses: anchore/sbom-action@v0.17.2
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
      - name: Install cosign
        if: ${{ secrets.COSIGN_PRIVATE_KEY != '' }}
        uses: sigstore/cosign-installer@v3
      - name: Sign checksums (cosign)
        if: ${{ secrets.COSIGN_PRIVATE_KEY != '' }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign-blob --key env://COSIGN_PRIVATE_KEY --output-signature dist/checksums.txt.sig dist/checksums.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*

  publish_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/spectral-cloud
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish_helm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Set chart version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/^version: .*/version: ${TAG}/" spectral-cloud/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${TAG}\"/" spectral-cloud/Chart.yaml
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package spectral-cloud --destination .cr-release-packages
      - name: Release chart
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: .
          packages_dir: .cr-release-packages
          skip_packaging: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
