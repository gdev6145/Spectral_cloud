global:
  resolve_timeout: 5m

route:
  receiver: "slack"
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: "email"
      continue: true
    - receiver: "pagerduty"
      continue: true
    - receiver: "opsgenie"
      continue: true

receivers:
  - name: "slack"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "${SLACK_CHANNEL}"
        title: "{{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true

  - name: "email"
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        from: "${ALERT_EMAIL_FROM}"
        smarthost: "${ALERT_SMTP_HOST}"
        auth_username: "${ALERT_SMTP_USER}"
        auth_password: "${ALERT_SMTP_PASS}"
        require_tls: true
        send_resolved: true

  - name: "pagerduty"
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        severity: "warning"
        description: "{{ .CommonAnnotations.summary }}"
        details:
          info: "{{ .CommonAnnotations.description }}"
        send_resolved: true

  - name: "opsgenie"
    opsgenie_configs:
      - api_key: "${OPSGENIE_API_KEY}"
        message: "{{ .CommonAnnotations.summary }}"
        description: "{{ .CommonAnnotations.description }}"
        priority: "P3"
        send_resolved: true
