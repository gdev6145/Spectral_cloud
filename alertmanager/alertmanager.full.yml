global:
  resolve_timeout: 5m

route:
  receiver: "slack"
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: "email"
      continue: true
    - receiver: "pagerduty"
      continue: true
    - receiver: "opsgenie"
      continue: true

receivers:
  - name: "slack"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/ME"
        channel: "#alerts"
        title: "{{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true

  - name: "email"
    email_configs:
      - to: "ops@example.com"
        from: "alertmanager@example.com"
        smarthost: "smtp.example.com:587"
        auth_username: "alertmanager@example.com"
        auth_password: "REPLACE_ME"
        require_tls: true
        send_resolved: true

  - name: "pagerduty"
    pagerduty_configs:
      - routing_key: "REPLACE_ME"
        severity: "warning"
        description: "{{ .CommonAnnotations.summary }}"
        details:
          info: "{{ .CommonAnnotations.description }}"
        send_resolved: true

  - name: "opsgenie"
    opsgenie_configs:
      - api_key: "REPLACE_ME"
        message: "{{ .CommonAnnotations.summary }}"
        description: "{{ .CommonAnnotations.description }}"
        priority: "P3"
        send_resolved: true
