      interval: 10s
      timeout: 2s
      retries: 5

  node4:
    build: .
    environment:
      - NODE_ENV=development
      - PORT=8083
      - DATA_DIR=/data
      - MAX_BODY_BYTES=1048576
      - RATE_LIMIT_RPS=10
      - RATE_LIMIT_BURST=20
      - BACKUP_INTERVAL=0
      - BACKUP_DIR=/data/backups
      - BACKUP_KEY_B64=
      - COMPACT_ON_START=false
      - COMPACT_INTERVAL=0
      - COMPACT_DIR=/data/compactions
      - COMPACT_RETENTION=3
      - ADMIN_ALLOW_REMOTE=false
      - ADMIN_ALLOWLIST_CIDRS=
      - ADMIN_API_KEY=
      - ADMIN_WRITE_KEY=
      - WRITE_API_KEY=
      - PUBLIC_PATHS=/health
      - ADMIN_PATHS=/admin/status
      - MESH_ENABLE=false
      - MESH_UDP_BIND=0.0.0.0:7003
      - MESH_NODE_ID=
      - MESH_PEERS=
      - MESH_HEARTBEAT_INTERVAL=5s
      - MESH_ROUTE_TTL=30s
      - MESH_SHARED_KEY=
      - MESH_SHARED_KEYS=
      - MESH_PEER_KEYS=
      - MESH_ANOMALY_WINDOW=5
