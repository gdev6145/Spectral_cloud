syntax = "proto3";

package spectralcloud.protocol;

option go_package = "github.com/gdev6145/Spectral_cloud/pkg/proto;proto";

message DataMessage {
  enum MsgType {
    DATA = 0;
    ACK = 1;
  }
  MsgType msg_type = 1;
  uint32 source_id = 2;
  uint32 destination_id = 3;
  int64 timestamp = 4;
  bytes payload = 5;
  string tenant_id = 6;
}

message ControlMessage {
  enum ControlType {
    HEARTBEAT = 0;
    HANDSHAKE = 1;
  }
  DataMessage.MsgType msg_type = 1;
  ControlType control_type = 2;
  uint32 node_id = 3;
  bytes payload = 4;
  string tenant_id = 5;
}

message Ack {
  uint32 source_id = 1;
  uint32 destination_id = 2;
  int64 timestamp = 3;
  string message = 4;
  string tenant_id = 5;
}

service MeshService {
  rpc SendData (DataMessage) returns (Ack);
  rpc SendControl (ControlMessage) returns (Ack);
}
