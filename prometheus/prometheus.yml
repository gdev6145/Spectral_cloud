global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'spectral_cloud'
    static_configs:
      - targets:
          - 'node1:8080'
          - 'node2:8081'
          - 'node3:8082'
          - 'node4:8083'
          - 'node5:8084'
